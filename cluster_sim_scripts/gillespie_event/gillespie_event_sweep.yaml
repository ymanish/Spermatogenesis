# Gillespie-event sweep + cluster config (single source of truth).
#
# Consumed by:
#   - cluster_sim_scripts/gillespie_event/generate_sweep_grid.py
#         reads: sprm_root, storage_root, sweep.{datasets, prot_p_conc, prot_cooperativity}
#   - src.gillespie_event.cli via --config (from launch_gillespie_event_sweep.job)
#         reads: all top-level pipeline keys (k_wrap, tau_max, replicates, ...)
#         silently ignores: sprm_root, storage_root, sweep
#
# Per-task overrides supplied by launch_gillespie_event_sweep.job from sweep_grid.tsv:
#   --dataset_dir, --storage_dir, --prot_p_conc, --prot_cooperativity, --n_workers
#
# Workflow (sweep_grid.tsv is a COMMITTED artifact — regenerate locally):
#   # locally (laptop/workstation with python3 + pyyaml):
#   1. Edit this file
#   2. python cluster_sim_scripts/gillespie_event/generate_sweep_grid.py --no-validate
#   3. git add gillespie_event_sweep.yaml sweep_grid.tsv && git commit && git push
#   # on the cluster:
#   4. git pull
#   5. ./cluster_sim_scripts/gillespie_event/submit_sweep.sh

# ── Sweep specification (read by generate_sweep_grid.py) ─────────────────────
sprm_root: /group/pol_schiessel/Manish/HAMNucRetSeq_pipeline/SPRM_data
storage_root: /group/pol_schiessel/Manish/Spermatogensis/output/gillespie_event_sweep_stable147

sweep:
  datasets:
    - ctrl01_random_genome_safe_stable147_refined
    - ctrl02_random_genome_gcmatched_stable147_refined
    - ctrl03_som_gcmatched_stable147_refined
    - ctrl04_bound_prom_evicted_stable147_refined
    - ctrl05_unbound_prom_yazdi_stable147_refined
    - ret_all_stable147_refined

  prot_p_conc:        [0.0, 0.01, 0.1, 1.0, 10.0, 100.0, 500.0, 1000.0]
  prot_cooperativity: [0.0, 4.5]

# ── Gillespie-event defaults (read by the CLI via --config) ──────────────────
# Per-task values are supplied by the .job script — left null/omitted here.
dataset_dir: null
storage_dir: null
dataset:     null

# Nucleosome parameters
k_wrap:        1.0
binding_sites: 14

# Protamine kinetics (prot_p_conc / prot_cooperativity live inside `sweep`
# and are passed per-task by the .job — not declared at top level here.)
prot_k_unbind: 89.7
prot_k_bind:   1.0

# Time / sampling
tau_max:           10000.0
n_survival_points: 1000

# Simulation behavior
inf_protamine: true
replicates:    10

# Execution (n_workers overridden by $SLURM_NTASKS in the .job)
batch_size:  1
n_workers:   20
flush_every: 10000

# Output
save_trajectories: true

# Testing / debugging (leave null for full production runs)
max_nucs: null

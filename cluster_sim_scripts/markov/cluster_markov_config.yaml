# Cluster-side defaults for the Markov sweep.
#
# This file is consumed by launch_markov_sweep.job via the CLI's --config flag.
# It is independent of src/markov_execution/markov_config.yaml (which is used for
# local runs). Edit this file to change cluster-wide defaults without touching
# the local config.
#
# Per-task values supplied by sweep_grid.tsv (and the .job script):
#   dataset_dir, storage_dir, prot_p_conc, prot_cooperativity, n_workers
#
# Everything else below applies to all 42 sweep tasks.

# ── Input / Output ───────────────────────────────────────────────────────────
# Paths are intentionally null here — the .job script supplies them per task
# from sweep_grid.tsv.
dataset_dir: null
infile: null
storage_dir: null
dataset: null

# ── Nucleosome parameters ────────────────────────────────────────────────────
k_wrap: 1.0
binding_sites: 14

# ── Protamine parameters ─────────────────────────────────────────────────────
prot_k_unbind: 89.7
prot_k_bind: 1.0
# prot_p_conc and prot_cooperativity are overridden per task by the sweep grid.
prot_p_conc: 0.0
prot_cooperativity: 0.0

# ── Computation ───────────────────────────────────────────────────────────────
tau_max: 1000.0            # maximum dimensionless time
tau_steps: 500             # number of time-sample points
method: ode                # solver method: expm or ode (ode is faster)
sparse: false

# ── Execution ─────────────────────────────────────────────────────────────────
batch_size: 10
# n_workers is overridden by the .job script with $SLURM_NTASKS at runtime.
n_workers: 20

# ── Output ────────────────────────────────────────────────────────────────────
save_survival: true
save_states: false
save_mfpt: true

# ── Testing / debugging ──────────────────────────────────────────────────────
max_nucs: null
subids_start: null
subids_end: null
